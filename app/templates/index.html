<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DCLT Navigator</title>
  <script>
    const CURRENT_USER = {{ ({"id": current_user.id, "username": current_user.username, "role": current_user.role} | tojson) if current_user.is_authenticated else "null" }};
  </script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      display: flex; flex-direction: column;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px; background: #f1f5f9; color: #1e293b;
    }

    /* ── Nav ─────────────────────────────────────────────────────────────── */
    nav {
      height: 48px; background: #1e2d3d; display: flex; align-items: center;
      padding: 0 1.25rem; gap: 2rem; flex-shrink: 0;
      border-bottom: 1px solid #0f172a;
    }
    .nav-brand { font-size: 15px; font-weight: 700; color: #93c5fd; letter-spacing: .01em; white-space: nowrap; }
    .nav-tabs  { display: flex; }
    .nav-tab {
      height: 48px; padding: 0 1rem; display: flex; align-items: center;
      color: #94a3b8; cursor: pointer; border-bottom: 3px solid transparent;
      font-size: 13px; font-weight: 500; user-select: none; transition: color .1s;
    }
    .nav-tab:hover { color: #e2e8f0; }
    .nav-tab.active { color: #f8fafc; border-bottom-color: #3b82f6; }
    .nav-user { margin-left: auto; display: flex; align-items: center; gap: .75rem; font-size: 12px; color: #94a3b8; }
    .nav-user a { color: #94a3b8; text-decoration: none; }
    .nav-user a:hover { color: #e2e8f0; }

    /* ── Adjudication controls ───────────────────────────────────────────── */
    .verdict-yes     { background:#dcfce7; color:#166534; border-radius:3px; padding:.1rem .35rem; font-size:10px; font-weight:700; }
    .verdict-no      { background:#fee2e2; color:#991b1b; border-radius:3px; padding:.1rem .35rem; font-size:10px; font-weight:700; }
    .verdict-unclear { background:#fef9c3; color:#854d0e; border-radius:3px; padding:.1rem .35rem; font-size:10px; font-weight:700; }
    .verdict-none    { background:#f1f5f9; color:#94a3b8; border-radius:3px; padding:.1rem .35rem; font-size:10px; }
    .adj-btn {
      padding:.2rem .55rem; border-radius:4px; border:1px solid #cbd5e1;
      font-size:11px; font-weight:600; cursor:pointer; background:#fff; color:#475569;
      transition:background .1s, border-color .1s;
    }
    .adj-btn:hover { background:#f8fafc; }
    .adj-btn.active.yes     { background:#dcfce7; border-color:#86efac; color:#166534; }
    .adj-btn.active.no      { background:#fee2e2; border-color:#fca5a5; color:#991b1b; }
    .adj-btn.active.unclear { background:#fef9c3; border-color:#fde047; color:#854d0e; }
    .adj-btn.pending        { opacity:.5; pointer-events:none; }
    .adj-hist-btn { font-size:11px; color:#94a3b8; background:none; border:none; cursor:pointer; padding:.2rem .3rem; }
    .adj-hist-btn:hover { color:#475569; }
    .adj-history { background:#f8fafc; border-radius:4px; padding:.4rem .6rem; margin-top:.25rem; }
    .adj-hist-row { display:flex; gap:.5rem; align-items:center; font-size:11px; color:#64748b; padding:.15rem 0; }

    /* ── Tag picker ──────────────────────────────────────────────────────────── */
    .tag-chips { display:flex; flex-wrap:wrap; gap:.35rem; }
    .tag-chip {
      position:relative; display:inline-flex; align-items:center;
      padding:.18rem .55rem; border-radius:12px; font-size:11px; font-weight:500;
      cursor:pointer; user-select:none; white-space:nowrap;
      border:1px solid #cbd5e1; background:#fff; color:#475569;
      transition:border-color .1s, background .1s;
    }
    .tag-chip:hover { border-color:#94a3b8; background:#f8fafc; }
    .tag-chip.applied { background:#dbeafe; border-color:#93c5fd; color:#1d4ed8; }
    .tag-chip.applied:hover { background:#bfdbfe; }
    .tag-chip.pending { opacity:.5; pointer-events:none; }
    .tag-chip.retired-state { font-style:italic; border-color:#fbbf24; color:#92400e; background:#fef3c7; }
    .tag-dropdown {
      position:absolute; top:calc(100% + 4px); left:0; z-index:20;
      background:#fff; border:1px solid #e2e8f0; border-radius:6px;
      box-shadow:0 4px 12px rgba(0,0,0,.12); min-width:140px; overflow:hidden;
    }
    .tag-dd-item {
      padding:.35rem .7rem; font-size:12px; cursor:pointer; color:#334155;
      display:flex; align-items:center; gap:.4rem;
    }
    .tag-dd-item:hover { background:#f1f5f9; }
    .tag-dd-item.current { font-weight:600; color:#1d4ed8; }
    .tag-dd-item.default-state::after { content:'default'; font-size:9px; color:#94a3b8; margin-left:auto; }
    .tag-dd-divider { border:none; border-top:1px solid #e2e8f0; margin:.2rem 0; }
    .tag-dd-remove { color:#dc2626; }
    .tag-dd-remove:hover { background:#fee2e2; }

    /* ── Admin secondary tabs ───────────────────────────────────────────────── */
    .admin-sec-tab {
      height:36px; padding:0 1.1rem; border:none; background:transparent;
      cursor:pointer; font-size:13px; font-weight:500; color:#64748b;
      border-bottom:2px solid transparent; white-space:nowrap;
    }
    .admin-sec-tab:hover { color:#1e293b; }
    .admin-sec-tab.active { color:#1e293b; border-bottom-color:#3b82f6; }

    /* ── Admin tag list & edit ───────────────────────────────────────────────── */
    .tag-list-row {
      padding:.5rem .75rem; border-bottom:1px solid #f1f5f9; cursor:pointer;
      display:flex; flex-direction:column; gap:.25rem;
    }
    .tag-list-row:hover { background:#f8fafc; }
    .tag-list-row.selected { background:#eff6ff; }
    .tag-list-row.deprecated { opacity:.55; }
    .tag-states-preview { font-size:11px; color:#64748b; }
    .tag-usage-preview { font-size:10px; color:#94a3b8; }
    .tag-state-row {
      display:flex; align-items:center; gap:.35rem; padding:.2rem 0;
      font-size:12px;
    }
    .tag-state-handle { color:#94a3b8; font-size:10px; }
    .tag-state-name { flex:1; }
    .tag-state-default { font-size:9px; color:#3b82f6; font-weight:600; text-transform:uppercase; }
    .tag-confirm-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,.35); z-index:200;
      display:flex; align-items:center; justify-content:center;
    }
    .tag-confirm-box {
      background:#fff; border-radius:8px; padding:1.5rem; max-width:400px; width:90%;
      box-shadow:0 8px 30px rgba(0,0,0,.15);
    }

    /* ── Layout ──────────────────────────────────────────────────────────── */
    .main   { flex: 1; overflow: hidden; display: flex; }
    .tab-panel { width: 100%; height: 100%; display: flex; }
    .three-col { display: flex; width: 100%; height: 100%; overflow: hidden; }
    .stub-panel { align-items: center; justify-content: center; color: #94a3b8; }

    /* ── Left column (shared) ────────────────────────────────────────────── */
    .col-left {
      width: 288px; flex-shrink: 0; display: flex; flex-direction: column;
      background: #fff; border-right: 1px solid #e2e8f0;
    }
    .col-left-controls {
      padding: .6rem .75rem; border-bottom: 1px solid #e2e8f0;
      display: flex; flex-direction: column; gap: .45rem; flex-shrink: 0;
    }
    .col-left-list   { flex: 1; overflow-y: auto; }
    .col-left-footer {
      padding: .4rem .75rem; border-top: 1px solid #e2e8f0; flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
      font-size: 11px; color: #64748b; gap: .5rem;
    }

    /* ── Middle column ───────────────────────────────────────────────────── */
    .col-mid { flex: 1; overflow-y: auto; min-width: 0; background: #fafafa; border-right: 1px solid #e2e8f0; }
    .col-mid-inner { padding: 1rem 1.1rem; }

    /* ── Right column ────────────────────────────────────────────────────── */
    .col-right { width: 42%; flex-shrink: 0; display: flex; flex-direction: column; background: #fff; }
    .col-right-header {
      padding: .5rem .9rem; border-bottom: 1px solid #e2e8f0; flex-shrink: 0;
      font-size: 11px; font-weight: 700; color: #94a3b8;
      text-transform: uppercase; letter-spacing: .07em;
    }
    .col-right-body { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

    /* ── Controls ────────────────────────────────────────────────────────── */
    .search-input {
      width: 100%; padding: .38rem .6rem; border: 1px solid #cbd5e1; border-radius: 4px;
      font-size: 13px; outline: none; color: #1e293b;
    }
    .search-input:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px #bfdbfe; }
    .ctrl-select {
      width: 100%; padding: .28rem .4rem; border: 1px solid #cbd5e1; border-radius: 4px;
      font-size: 12px; outline: none; background: #fff; color: #1e293b;
    }
    .ctrl-select:focus { border-color: #3b82f6; }
    .sort-row { display: flex; gap: .35rem; align-items: center; }
    .sort-label { font-size: 11px; color: #94a3b8; white-space: nowrap; }
    .sort-dir-btn {
      padding: .28rem .55rem; border: 1px solid #cbd5e1; border-radius: 4px;
      background: #fff; cursor: pointer; font-size: 14px; line-height: 1; color: #475569; flex-shrink: 0;
    }
    .sort-dir-btn:hover { background: #f8fafc; }

    /* ── List rows ───────────────────────────────────────────────────────── */
    .list-row {
      padding: .45rem .75rem; border-bottom: 1px solid #f1f5f9; cursor: pointer;
      border-left: 3px solid transparent; transition: background .1s;
    }
    .list-row:hover  { background: #f8fafc; }
    .list-row.selected { background: #eff6ff; border-left-color: #3b82f6; }
    .row-id    { font-size: 10px; color: #94a3b8; letter-spacing: .03em; }
    .row-main  { font-size: 13px; font-weight: 500; line-height: 1.35; color: #0f172a; }
    .row-sub   { font-size: 11px; color: #64748b; margin-top: 1px; }
    .row-kws   { display: flex; flex-wrap: wrap; gap: 2px; margin-top: 3px; }

    /* ── Pagination ──────────────────────────────────────────────────────── */
    .paging-btns { display: flex; gap: .25rem; }
    .paging-btn {
      padding: .18rem .45rem; border: 1px solid #cbd5e1; border-radius: 3px;
      background: #fff; cursor: pointer; font-size: 11px; color: #374151;
    }
    .paging-btn:hover:not(:disabled) { background: #f1f5f9; }
    .paging-btn:disabled { opacity: .4; cursor: default; }
    .paging-page { font-size: 11px; align-self: center; white-space: nowrap; }

    /* ── Sections ────────────────────────────────────────────────────────── */
    .section { margin-bottom: 1.4rem; }
    .section-title {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .1em; color: #94a3b8;
      padding-bottom: .35rem; margin-bottom: .6rem; border-bottom: 2px solid #e2e8f0;
    }

    /* ── Attr table ──────────────────────────────────────────────────────── */
    .attr-table { width: 100%; border-collapse: collapse; }
    .attr-table tr { border-bottom: 1px solid #f1f5f9; }
    .attr-table td { padding: .28rem .3rem; font-size: 13px; vertical-align: top; }
    .attr-label { color: #64748b; width: 44%; }
    .attr-value { color: #0f172a; font-weight: 500; }

    /* ── Document table ──────────────────────────────────────────────────── */
    .doc-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .doc-table th {
      text-align: left; padding: .3rem .45rem; background: #f8fafc;
      color: #64748b; font-weight: 600; font-size: 11px;
      border-bottom: 2px solid #e2e8f0; white-space: nowrap;
    }
    .doc-table td { padding: .32rem .45rem; border-bottom: 1px solid #f1f5f9; vertical-align: top; }
    .doc-row { cursor: pointer; transition: background .1s; }
    .doc-row:hover  { background: #f0f9ff; }
    .doc-row.active { background: #eff6ff; }
    .doc-party { max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ── Badges ──────────────────────────────────────────────────────────── */
    .badge {
      display: inline-block; font-size: 11px; padding: .15rem .45rem;
      border-radius: 3px; font-weight: 500; line-height: 1.4;
    }
    .badge-blue   { background: #dbeafe; color: #1d4ed8; }
    .badge-green  { background: #dcfce7; color: #166534; }
    .badge-gray   { background: #f1f5f9; color: #64748b; }
    .badge-orange { background: #ffedd5; color: #c2410c; }
    .badge-teal   { background: #ccfbf1; color: #0f766e; }
    .badge-purple { background: #ede9fe; color: #6d28d9; }
    .badge-amber  { background: #fef9c3; color: #92400e; }

    /* ── Keyword badges (mini) ───────────────────────────────────────────── */
    .kw-badge {
      font-size: 10px; padding: .1rem .35rem; border-radius: 2px;
      font-weight: 600; line-height: 1.3;
    }
    .kw-cr   { background: #ccfbf1; color: #0f766e; }
    .kw-a97  { background: #ede9fe; color: #6d28d9; }
    .kw-dr   { background: #ffedd5; color: #c2410c; }
    .kw-c61  { background: #dcfce7; color: #166534; }
    .kw-apr  { background: #fef9c3; color: #92400e; }
    .kw-pr   { background: #dbeafe; color: #1d4ed8; }
    .kw-ccr  { background: #f1f5f9; color: #64748b; }

    /* ── Keyword score bars ──────────────────────────────────────────────── */
    .kw-score-row {
      display: grid; grid-template-columns: 200px 1fr 48px;
      align-items: center; gap: .5rem; padding: .25rem 0;
      font-size: 12px; border-bottom: 1px solid #f8fafc;
    }
    .kw-score-row:last-child { border-bottom: none; }
    .kw-bar-track { height: 8px; background: #f1f5f9; border-radius: 4px; overflow: hidden; }
    .kw-bar-fill  { height: 100%; border-radius: 4px; transition: width .3s; }
    .kw-val { text-align: right; font-weight: 600; color: #1e293b; font-size: 11px; }

    /* ── GIS flags ───────────────────────────────────────────────────────── */
    .gis-flag-grid  { display: flex; flex-wrap: wrap; gap: .35rem; margin-bottom: .8rem; }
    .gis-flag { font-size: 11px; padding: .18rem .5rem; border-radius: 3px; font-weight: 500; line-height: 1.4; }
    .gis-flag.on  { background: #dcfce7; color: #166534; cursor: pointer; }
    .gis-flag.on:hover { background: #bbf7d0; }
    .gis-flag.off { background: #f1f5f9; color: #94a3b8; }
    .gis-groups { display: flex; flex-direction: column; gap: .4rem; }
    .gis-group  { border: 1px solid #e2e8f0; border-radius: 4px; overflow: hidden; }
    .gis-group-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: .35rem .6rem; background: #f8fafc; cursor: pointer;
      user-select: none; font-size: 12px; font-weight: 600; color: #374151;
    }
    .gis-group-header:hover { background: #f1f5f9; }
    .gis-group-body { padding: .4rem .6rem; background: #fff; }
    .gis-detail-row { display: grid; grid-template-columns: 150px 1fr; gap: .25rem; padding: .15rem 0; font-size: 12px; border-bottom: 1px solid #f8fafc; }
    .gis-detail-row:last-child { border-bottom: none; }
    .gis-detail-label { color: #64748b; }
    .gis-detail-value { color: #1e293b; font-weight: 500; word-break: break-word; }

    /* ── Empty / loading ─────────────────────────────────────────────────── */
    .empty-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%; color: #94a3b8; gap: .4rem; padding: 2rem; text-align: center;
    }
    .empty-icon  { font-size: 28px; }
    .loading-msg { display: flex; align-items: center; justify-content: center; padding: 3rem; color: #94a3b8; }

    /* ── PDF / no-scan panel ─────────────────────────────────────────────── */
    .no-scan-panel {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%; gap: 1rem; padding: 2rem; text-align: center; color: #64748b;
    }
    .rod-link {
      display: inline-block; padding: .5rem 1.1rem; background: #3b82f6; color: #fff;
      border-radius: 5px; text-decoration: none; font-size: 13px; font-weight: 600;
      border: none; cursor: pointer;
    }
    .rod-link:hover { background: #2563eb; }
    .rod-doc-meta { font-size: 12px; color: #94a3b8; }

    /* ── OCR text ────────────────────────────────────────────────────────── */
    .ocr-text {
      white-space: pre-wrap; word-break: break-word;
      font-family: 'Courier New', monospace; font-size: 11px;
      line-height: 1.6; color: #374151; background: #f8fafc;
      padding: .75rem; border-radius: 4px; max-height: 320px;
      overflow-y: auto; border: 1px solid #e2e8f0;
    }

    /* ── Overview tab ────────────────────────────────────────────────────── */
    .overview-page { width: 100%; height: 100%; overflow-y: auto; padding: 1.5rem; }
    .overview-hdr  { margin-bottom: 1.25rem; }
    .overview-hdr h2  { font-size: 18px; font-weight: 700; color: #0f172a; }
    .overview-hdr p   { font-size: 12px; color: #94a3b8; margin-top: .2rem; }
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1rem;
    }
    .stat-card {
      background: #fff; border: 1px solid #e2e8f0; border-radius: 6px;
      padding: 1rem 1.1rem; display: flex; flex-direction: column; gap: .75rem;
    }
    .stat-card-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: #94a3b8; }
    .stat-primary { display: flex; align-items: baseline; gap: .4rem; }
    .stat-big     { font-size: 28px; font-weight: 700; color: #0f172a; line-height: 1; }
    .stat-unit    { font-size: 13px; color: #64748b; }
    .stat-subs    { display: flex; flex-direction: column; gap: .2rem; }
    .stat-sub     { display: flex; justify-content: space-between; font-size: 12px; color: #64748b; padding: .15rem 0; border-bottom: 1px solid #f8fafc; }
    .stat-sub:last-child { border-bottom: none; }
    .stat-sub-val { font-weight: 600; color: #374151; }

    /* breakdown bars */
    .brk-list  { display: flex; flex-direction: column; gap: .3rem; }
    .brk-row   { display: flex; justify-content: space-between; align-items: baseline; gap: .4rem; font-size: 12px; margin-bottom: 2px; }
    .brk-label { color: #475569; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .brk-count { font-weight: 600; color: #1e293b; white-space: nowrap; font-size: 11px; flex-shrink: 0; }
    .brk-bar-wrap { height: 4px; background: #f1f5f9; border-radius: 2px; overflow: hidden; margin-bottom: .45rem; }
    .brk-bar      { height: 100%; background: #3b82f6; border-radius: 2px; }

    /* layer table */
    .layer-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .layer-table td { padding: .25rem .3rem; border-bottom: 1px solid #f8fafc; }
    .layer-table td:last-child { text-align: right; font-weight: 600; }
    .layer-table tr:last-child td { border-bottom: none; }
    .layer-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #3b82f6; margin-right: .4rem; }

    /* kw hits table */
    .kw-hits-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .kw-hits-table td { padding: .2rem .3rem; border-bottom: 1px solid #f8fafc; }
    .kw-hits-table td:last-child { text-align: right; }
    .kw-hits-table tr:last-child td { border-bottom: none; }
  </style>
</head>
<body x-data="app()">

  <!-- Nav -->
  <nav>
    <span class="nav-brand">DCLT Navigator</span>
    <div class="nav-tabs">
      <div class="nav-tab" :class="{active:activeTab==='overview'}"  @click="switchTab('overview')">Overview</div>
      <div class="nav-tab" :class="{active:activeTab==='parcels'}"   @click="switchTab('parcels')">Parcels</div>
      <div class="nav-tab" :class="{active:activeTab==='documents'}" @click="switchTab('documents')">Documents</div>
      <div class="nav-tab" :class="{active:activeTab==='admin'}"     @click="switchTab('admin')">Admin</div>
    </div>
    <div class="nav-user">
      {% if current_user.is_authenticated %}
        <span>{{ current_user.username }}</span>
        <a href="/logout">Sign out</a>
      {% else %}
        <a href="/login">Sign in</a>
      {% endif %}
    </div>
  </nav>

  <div class="main">

    <!-- ═══════════════════════════ OVERVIEW TAB ════════════════════════════ -->
    <div class="tab-panel" x-show="activeTab==='overview'" style="overflow:hidden;">
      <div class="overview-page">

        <template x-if="overviewLoading">
          <div class="loading-msg">Loading…</div>
        </template>

        <template x-if="!overviewLoading && overviewData">
          <div>
            <div class="overview-hdr">
              <h2>Reference Database</h2>
              <p x-text="overviewData.pipeline.last_run
                ? 'Last built ' + overviewData.pipeline.last_run.run_at.slice(0,10)
                : 'Build date unknown'"></p>
            </div>

            <div class="stat-grid">

              <!-- Registry of Deeds -->
              <div class="stat-card">
                <div class="stat-card-title">Registry of Deeds</div>
                <div class="stat-primary">
                  <span class="stat-big" x-text="overviewData.registry.documents.toLocaleString()"></span>
                  <span class="stat-unit">documents</span>
                </div>
                <div class="stat-subs">
                  <div class="stat-sub">
                    <span>Local scans</span>
                    <span class="stat-sub-val"
                      x-text="overviewData.registry.scan_cached.toLocaleString()

                      <template x-for="(info, kw) in overviewData.registry.kw_hits" :key="kw">

                    </table>
                  </div>
                </template>
              </div>

                  <span class="stat-unit">parcels</span>
                </div>
                <div>
                  <div style="font-size:11px;color:#94a3b8;font-weight:600;margin-bottom:.4rem;">By property class</div>
                  <div class="brk-list">
                    <template x-for="row in overviewData.parcels.by_class" :key="row.property_class">
                      <div>
                        <div class="brk-row">

                          <span class="brk-count" x-text="row.n.toLocaleString()"></span>
                        </div>
                        <div class="brk-bar-wrap">
                          <div class="brk-bar" :style="'width:'+Math.min(100,row.n/overviewData.parcels.total*100)+'%'"></div>
                        </div>
                      </div>
                    </template>
                  </div>
                </div>
              </div>

              <!-- GIS Layers -->
              <div class="stat-card">
                <div class="stat-card-title">GIS Layers</div>
                <div class="stat-primary">
                  <span class="stat-big" x-text="overviewData.gis.total_parcels.toLocaleString()"></span>
                  <span class="stat-unit">parcels with overlay</span>
                </div>
                <div class="stat-subs">
                  <div class="stat-sub">
                    <span>Data sources</span>
                    <span class="stat-sub-val" x-text="overviewData.gis.sources + ' layers'"></span>
                  </div>
                </div>
                <div>
                  <div style="font-size:11px;color:#94a3b8;font-weight:600;margin-bottom:.4rem;">Layer coverage</div>
                  <table class="layer-table">
                    <template x-for="row in overviewData.gis.layer_coverage" :key="row.layer">
                      <tr>
                        <td>
                          <span class="layer-dot" x-show="row.n > 0"></span>
                          <span x-text="row.layer"></span>

                        <td x-text="row.n.toLocaleString()"></td>
                      </tr>
                    </template>
                  </table>
                </div>
              </div>

              <!-- Assessor + MassGIS -->
              <div class="stat-card">
                <div class="stat-card-title">Assessor &amp; MassGIS</div>
                <div class="stat-subs">
                  <div class="stat-sub">
                    <span>Assessor records (incl. condo units)</span>
                    <span class="stat-sub-val" x-text="overviewData.assessor.records.toLocaleString()"></span>
                  </div>
                  <div class="stat-sub">
                    <span>MassGIS parcel features (raw)</span>
                    <span class="stat-sub-val" x-text="overviewData.massgis.raw.toLocaleString()"></span>
                  </div>
                  <div class="stat-sub">
                    <span>MassGIS normalized (1 per parcel)</span>
                    <span class="stat-sub-val" x-text="overviewData.massgis.normalized.toLocaleString()"></span>
                  </div>
                </div>
              </div>

              <!-- Town Meeting -->
              <div class="stat-card">
                <div class="stat-card-title">Town Meeting Warrants</div>
                <div class="stat-primary">
                  <span class="stat-big" x-text="overviewData.warrants.total.toLocaleString()"></span>
                  <span class="stat-unit">articles</span>
                </div>
                <div class="stat-subs">
                  <div class="stat-sub">
                    <span>Year range</span>
                    <span class="stat-sub-val"
                      x-text="overviewData.warrants.year_range.min_year + ' – ' + overviewData.warrants.year_range.max_year">
                    </span>
                  </div>
                </div>
                <div>
                  <div style="font-size:11px;color:#94a3b8;font-weight:600;margin-bottom:.4rem;">By result</div>
                  <div class="brk-list">
                    <template x-for="row in overviewData.warrants.by_result" :key="row.result">
                      <div>
                        <div class="brk-row">
                          <span class="brk-label" x-text="row.result"></span>
                          <span class="brk-count" x-text="row.n.toLocaleString()"></span>
                        </div>
                        <div class="brk-bar-wrap">
                          <div class="brk-bar" :style="'width:'+Math.min(100,row.n/overviewData.warrants.total*100)+'%'"></div>
                        </div>
                      </div>
                    </template>
                  </div>
                </div>
              </div>

              <!-- Reference -->
              <div class="stat-card">
                <div class="stat-card-title">Reference Tables</div>
                <div class="stat-subs">
                  <div class="stat-sub">
                    <span>Land use codes</span>
                    <span class="stat-sub-val" x-text="overviewData.reference.use_codes"></span>
                  </div>
                  <div class="stat-sub">
                    <span>Schema columns documented</span>
                    <span class="stat-sub-val" x-text="overviewData.reference.schema_columns"></span>
                  </div>
                  <div class="stat-sub">
                    <span>GIS data sources</span>
                    <span class="stat-sub-val" x-text="overviewData.gis.sources"></span>
                  </div>

            </div><!-- /stat-grid -->
          </div>
        </template>

      </div>
    </div><!-- /overview tab -->

    <!-- ═══════════════════════════ PARCELS TAB ══════════════════════════════ -->
    <div class="tab-panel three-col" x-show="activeTab==='parcels'">

      <!-- Left: parcel list -->
      <div class="col-left">
        <div class="col-left-controls">
          <div style="position:relative">
            <input class="search-input" x-model="parcelSearch"
              placeholder="Type wetlands, article 97, or anything to filter properties"
              type="search" autocomplete="off"
              @focus="parcelSearchOpen=true"
              @blur="setTimeout(()=>parcelSearchOpen=false,150)"
              @input="parcelSearchKeyword=null; parcelPage=1">
            <div x-show="parcelSearchOpen && parcelSearch.trim()"
              style="position:absolute;top:100%;left:0;right:0;z-index:50;background:#fff;border:1px solid #d1d5db;border-radius:6px;box-shadow:0 4px 12px rgba(0,0,0,.12);margin-top:2px;overflow:hidden">
              <template x-for="kw in parcelKeywordSuggestions" :key="kw.key">
                <div style="padding:8px 12px;cursor:pointer;font-size:.875rem"
                  @mousedown.prevent="parcelSearchKeyword=kw.key; parcelSearch=kw.label; parcelSearchOpen=false; parcelPage=1"
                  @mouseover="$el.style.background='#f3f4f6'" @mouseout="$el.style.background=''">
                  <span x-text="kw.label"></span>
                </div>
              </template>
              <div style="padding:8px 12px;cursor:pointer;font-size:.875rem;color:#6b7280;border-top:1px solid #e5e7eb"
                @mousedown.prevent="parcelSearchKeyword=null; parcelSearchOpen=false; parcelPage=1"
                @mouseover="$el.style.background='#f3f4f6'" @mouseout="$el.style.background=''">
                Search for '<span x-text="parcelSearch"></span>'
              </div>
            </div>
          </div>
          <div class="sort-row">
            <span class="sort-label">Sort</span>
            <select class="ctrl-select" x-model="parcelSort">
              <option value="site_addr">Address</option>
              <option value="owner_name">Owner</option>
              <option value="parcel_id">Parcel ID</option>
              <option value="totalapprvalue">Value</option>
              <option value="property_class">Class</option>
              <option value="billingacres">Acres</option>
            </select>
            <button class="sort-dir-btn" @click="parcelSortDir = parcelSortDir==='asc'?'desc':'asc'"
              :title="parcelSortDir==='asc'?'Ascending':'Descending'">
              <span x-text="parcelSortDir==='asc'?'↑':'↓'"></span>
            </button>
          </div>
          <label style="display:flex;align-items:center;gap:6px;font-size:.8rem;color:#64748b;cursor:pointer;padding-top:2px;">
            <input type="checkbox" x-model="parcelHideUnmappable" @change="parcelPage=1">
            Only mappable parcels
          </label>
        </div>

        <div class="col-left-footer">
          <span x-text="parcelFilteredCount.toLocaleString()+' parcel'+(parcelFilteredCount!==1?'s':'')+(parcelSearch.trim()?' found':'')"></span>
          <a :href="parcelExportUrl" class="paging-btn" style="text-decoration:none;" download>↓ CSV</a>
          <div class="paging-btns">
            <button class="paging-btn" @click="parcelPage=1"            :disabled="parcelPage===1">«</button>
            <button class="paging-btn" @click="parcelPage--"            :disabled="parcelPage===1">‹</button>
            <span   class="paging-page" x-text="parcelPage+' / '+parcelTotalPages"></span>
            <button class="paging-btn" @click="parcelPage++"            :disabled="parcelPage>=parcelTotalPages">›</button>
            <button class="paging-btn" @click="parcelPage=parcelTotalPages" :disabled="parcelPage>=parcelTotalPages">»</button>
          </div>
        </div>

        <div class="col-left-list">
          <template x-if="parcelsLoading"><div class="loading-msg">Loading…</div></template>
          <template x-if="!parcelsLoading">
            <div>
              <template x-for="p in pagedParcels" :key="p.parcel_id">
                <div class="list-row" :class="{selected:selectedParcelId===p.parcel_id}" @click="selectParcel(p)">
                  <div class="row-id"   x-text="p.parcel_id"></div>
                  <div class="row-main" x-text="p.site_addr||'(no address)'"></div>
                  <div class="row-sub"  x-text="p.owner_name||'—'"></div>
                </div>
              </template>
              <template x-if="pagedParcels.length===0">
                <div class="empty-state" style="height:100px;">No results</div>
              </template>
            </div>
          </template>
        </div>
      </div>

      <!-- Middle: parcel detail -->
      <div class="col-mid">
        <div class="col-mid-inner">

          <template x-if="!selectedParcelId">
            <div class="empty-state" style="height:60vh;">
              <span class="empty-icon">🗂</span><span>Select a parcel</span>
            </div>
          </template>
          <template x-if="selectedParcelId && parcelDetailLoading">
            <div class="loading-msg">Loading…</div>
          </template>
          <template x-if="selectedParcelId && !parcelDetailLoading && parcelDetailError">
            <div class="empty-state" style="color:#dc2626;">
              <span class="empty-icon">⚠</span>
              <span x-text="parcelDetailError"></span>
            </div>
          </template>
          <template x-if="selectedParcelId && !parcelDetailLoading && parcelDetail">
            <div>
              <div style="margin-bottom:1rem;">
                <div style="font-size:18px;font-weight:700;color:#0f172a;" x-text="parcelDetail.parcel.site_addr||parcelDetail.parcel.parcel_id"></div>
                <div style="font-size:13px;color:#64748b;margin-top:2px;" x-text="parcelDetail.parcel.parcel_id"></div>
                <div style="margin-top:.4rem;display:flex;flex-wrap:wrap;gap:.35rem;">
                  <span class="badge" :class="propClassBadge(parcelDetail.parcel.property_class)" x-text="parcelDetail.parcel.property_class||'Unknown'"></span>
                  <span x-show="parcelDetail.parcel.is_public" class="badge badge-teal">Public</span>
                  <span x-show="(parcelDetail.parcel.condo_units||0)>0" class="badge badge-purple" x-text="parcelDetail.parcel.condo_units+' condo units'"></span>
                </div>
              </div>

              <div class="section">
                <div class="section-title">Parcel Attributes</div>
                <table class="attr-table">
                  <tbody>
                    <template x-for="[lbl,val] in parcelAttrs(parcelDetail.parcel)" :key="lbl">
                      <tr><td class="attr-label" x-text="lbl"></td><td class="attr-value" x-text="val||'—'"></td></tr>
                    </template>
                  </tbody>
                </table>
              </div>

              <div class="section">
                <div class="section-title">Registry of Deeds
                  <template x-if="parcelDetail.documents.length">
                    <span style="font-weight:400;text-transform:none;letter-spacing:0;"
                      x-text="' — '+parcelDetail.documents.length+' record'+(parcelDetail.documents.length!==1?'s':'')"></span>
                  </template>
                </div>
                <template x-if="parcelDetail.documents.length===0">
                  <div style="color:#94a3b8;font-size:13px;">No records found</div>
                </template>
                <template x-if="parcelDetail.documents.length>0">
                  <div style="overflow-x:auto;">
                    <table class="doc-table">
                      <thead><tr><th>#</th><th>Type</th><th>Recorded</th><th>Grantor</th><th>Grantee</th><th>Book/Page</th><th>PDF</th></tr></thead>
                      <tbody>
                        <template x-for="doc in parcelDetail.documents" :key="doc.doc_rank">
                          <tr class="doc-row" :class="{active:parcelSelectedDoc&&parcelSelectedDoc.doc_rank===doc.doc_rank}" @click="selectParcelDoc(doc)">
                            <td x-text="doc.doc_rank"></td>
                            <td x-text="doc.instrument_type||'—'"></td>
                            <td x-text="doc.recorded_date?doc.recorded_date.slice(0,10):'—'"></td>
                            <td class="doc-party" :title="doc.grantor" x-text="doc.grantor||'—'"></td>
                            <td class="doc-party" :title="doc.grantee" x-text="doc.grantee||'—'"></td>
                            <td x-text="doc.book+' / '+doc.page"></td>
                            <td>
                              <template x-if="doc.scan_cached"><span class="badge badge-green" style="font-size:10px;padding:.1rem .35rem;">Local</span></template>
                              <template x-if="!doc.scan_cached"><span class="badge badge-gray" style="font-size:10px;padding:.1rem .35rem;">RoD</span></template>
                            </td>
                          </tr>
                        </template>
                      </tbody>
                    </table>
                  </div>
                </template>
              </div>

              <div class="section">
                <div class="section-title">GIS Layers</div>
                <template x-if="!parcelDetail.gis">
                  <div style="color:#94a3b8;font-size:13px;">No GIS overlay data</div>
                </template>
                <template x-if="parcelDetail.gis">
                  <div>
                    <div class="gis-flag-grid">
                      <template x-for="g in gisGroups(parcelDetail.gis,parcelDetail.soil)" :key="g.key">
                        <span class="gis-flag" :class="g.present?'on':'off'" x-text="g.label" @click="g.present&&toggleGis(g.key)"></span>
                      </template>
                    </div>
                    <div class="gis-groups">
                      <template x-for="g in gisGroups(parcelDetail.gis,parcelDetail.soil)" :key="g.key">
                        <template x-if="g.present">
                          <div class="gis-group">
                            <div class="gis-group-header" @click="toggleGis(g.key)">
                              <span x-text="g.label"></span>
                              <span style="font-size:10px;color:#94a3b8;" x-text="parcelGisOpen[g.key]?'▲':'▼'"></span>
                            </div>
                            <div class="gis-group-body" x-show="parcelGisOpen[g.key]">
                              <template x-for="[lbl,val] in g.fields.filter(f=>f[1]!==null&&f[1]!==undefined&&f[1]!=='')" :key="lbl">
                                <div class="gis-detail-row">
                                  <span class="gis-detail-label" x-text="lbl"></span>
                                  <span class="gis-detail-value" x-text="val"></span>
                                </div>
                              </template>
                            </div>
                          </div>
                        </template>
                      </template>
                    </div>
                  </div>
                </template>
              </div>

              <!-- Tags -->
              <template x-if="CURRENT_USER">
                <div class="section">
                  <div class="section-title">Tags</div>
                  <template x-if="tagsLoading">
                    <div style="font-size:12px;color:#94a3b8;">Loading…</div>
                  </template>
                  <div class="tag-chips">
                    <template x-for="tag in allTags" :key="tag.tag_id">
                      <div class="tag-chip"
                        :class="{
                          applied:  parcelTagState[tag.tag_id] != null,
                          pending:  tagPending[tag.tag_id],
                          'retired-state': parcelTagState[tag.tag_id] != null && !tag.states_csv.split(',').includes(parcelTagState[tag.tag_id])
                        }"
                        @click.stop="toggleTagPicker('parcel', tag.tag_id)">
                        <span x-text="parcelTagState[tag.tag_id] != null ? tag.name + ' : ' + parcelTagState[tag.tag_id] : tag.name"></span>
                        <div class="tag-dropdown" x-show="tagPickerOpen === 'parcel:'+tag.tag_id" @click.stop>
                          <template x-for="(s, i) in tag.states_csv.split(',')" :key="s">
                            <div class="tag-dd-item"
                              :class="{current: parcelTagState[tag.tag_id]===s, 'default-state': i===0 && parcelTagState[tag.tag_id]==null}"
                              @click="applyTag('parcel', selectedParcelId, tag.tag_id, s)">
                              <span x-text="s"></span>
                            </div>
                          </template>
                          <template x-if="parcelTagState[tag.tag_id] != null">
                            <div>
                              <hr class="tag-dd-divider">
                              <div class="tag-dd-item tag-dd-remove"
                                @click="applyTag('parcel', selectedParcelId, tag.tag_id, null)">
                                Remove tag
                              </div>
                            </div>
                          </template>
                        </div>
                      </div>
                    </template>
                    <template x-if="allTags.length === 0 && !tagsLoading">
                      <span style="font-size:12px;color:#94a3b8;">No tags defined</span>
                    </template>
                  </div>
                </div>
              </template>

            </div>
          </template>

        </div>
      </div>

      <!-- Right: Map / PDF viewer -->
      <div class="col-right">
        <div class="col-right-header" x-text="parcelSelectedDoc ? 'Document View' : (selectedParcelId ? 'Parcel Map' : 'Document View')"></div>
        <div class="col-right-body">
          <div x-show="!selectedParcelId" class="empty-state">
            <span class="empty-icon">📄</span><span>Select a parcel</span>
          </div>
          <div id="parcel-map" x-show="selectedParcelId && !parcelSelectedDoc" style="flex:1;width:100%;min-height:0;"></div>
          <div x-show="parcelSelectedDoc && !parcelPdfUrl" class="no-scan-panel">
            <div class="rod-doc-meta" x-text="parcelSelectedDoc ? (parcelSelectedDoc.instrument_type||'Document')+' · Book '+parcelSelectedDoc.book+', Page '+parcelSelectedDoc.page : ''"></div>
            <div style="font-size:13px;color:#64748b;">No local scan</div>
            <button class="rod-link"
              @click="parcelPdfUrl='/api/documents/'+parcelSelectedDoc.book+'/'+parcelSelectedDoc.page+'/rod'">
              Read from Registry of Deeds
            </button>
          </div>
          <iframe x-show="parcelSelectedDoc && parcelPdfUrl" :src="parcelPdfUrl || ''" style="flex:1;width:100%;height:100%;border:none;"></iframe>
        </div>
      </div>

    </div><!-- /parcels tab -->

    <!-- ══════════════════════════ DOCUMENTS TAB ════════════════════════════ -->
    <div class="tab-panel three-col" x-show="activeTab==='documents'">

      <!-- Left: document list -->
      <div class="col-left">
        <div class="col-left-controls">
          <input class="search-input" x-model.debounce.300ms="docSearch"

            <template x-for="t in docTypes" :key="t"><option :value="t" x-text="t"></option></template>
          </select>
          <select class="ctrl-select" x-model="docKwFilter">
            <option value="">All keyword scores</option>
            <option value="conservation_restriction">Conservation Restriction</option>
            <option value="article_97">Article 97</option>
            <option value="deed_restriction">Deed Restriction</option>
            <option value="chapter_61">Chapter 61</option>
            <option value="agricultural_preservation_restriction">Ag. Preservation</option>
            <option value="perpetual_restriction">Perpetual Restriction</option>
            <option value="ccr">CC&amp;R</option>

          <template x-if="docKwFilter">
            <div style="display:flex;align-items:center;gap:.4rem;">
              <span style="font-size:11px;color:#94a3b8;white-space:nowrap;">Min confidence</span>

            </div>
          </template>

            <span class="sort-label">Sort</span>
            <select class="ctrl-select" x-model="docSort">
              <option value="recorded_date">Date</option>
              <option value="instrument_type">Type</option>
              <option value="address">Address</option>
              <option value="grantor">Grantor</option>
              <option value="kw_conservation_restriction">↑ CR Score</option>
              <option value="kw_article_97">↑ A97 Score</option>
              <option value="kw_deed_restriction">↑ DR Score</option>
              <option value="kw_perpetual_restriction">↑ PR Score</option>
            </select>
            <button class="sort-dir-btn" @click="docSortDir=docSortDir==='asc'?'desc':'asc'"
              :title="docSortDir==='asc'?'Ascending':'Descending'">
              <span x-text="docSortDir==='asc'?'↑':'↓'"></span>
            </button>
          </div>
        </div>

          <template x-if="docsLoading"><div class="loading-msg">Loading…</div></template>

              <template x-for="d in pagedDocuments" :key="d.book+'_'+d.page">

                  :class="{selected: docSelectedBP && docSelectedBP.book===d.book && docSelectedBP.page===d.page}"
